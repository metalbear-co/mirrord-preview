name: 'mirrord Preview Environment'
description: 'Start or stop a mirrord preview environment'
branding:
  icon: 'cloud'
  color: 'purple'

inputs:
  action:
    description: 'Action to perform: "start" or "stop"'
    required: true
  target:
    description: 'Kubernetes target path (e.g. deployment/my-app). Required for start.'
    required: false
  namespace:
    description: 'Kubernetes namespace of the target. Optional, defaults to current context namespace.'
    required: false
  mode:
    description: 'Traffic mode: "steal" or "mirror". Default: steal'
    required: false
    default: 'steal'
  filter:
    description: 'Header filter regex applied to incoming HTTP traffic (and future SQS/Kafka filters). May reference {key}.'
    required: false
  ports:
    description: 'JSON array of HTTP filter ports, e.g. [80, 8080]'
    required: false
  ttl_mins:
    description: 'Session time-to-live in minutes. Integer or "infinite".'
    required: false
  image:
    description: 'Container image for the preview environment (e.g. myrepo/myapp:latest). Required for start.'
    required: false
  key:
    description: 'Unique preview session key. Optional for start (auto-generated if omitted), required for stop.'
    required: false
  cli_path:
    description: Path to mirrord cli, will be used instead of the latest version when specified.
      Note that this works by symlinking `/usr/local/bin/mirrord` to this path.
    required: false
  extra_config:
    description: 'JSON object merged into the generated mirrord.json. Allows setting any additional mirrord config options. Overrides generated fields if overlapping.'
    required: false

outputs:
  session-key:
    description: 'The preview session key (extracted from mirrord CLI output)'
    value: ${{ steps.run-preview.outputs.session-key }}

runs:
  using: 'composite'
  steps:
    # ------------------------------------------------------------------ #
    # 1. Install or restore mirrord CLI from cache
    # ------------------------------------------------------------------ #
    - name: Detect latest mirrord version
      id: mirrord-version
      shell: bash
      run: |
        MIRRORD_VERSION=$(curl -fsSL https://version.mirrord.dev/v1/version 2>/dev/null || echo "latest")
        echo "version=${MIRRORD_VERSION}" >> "$GITHUB_OUTPUT"
        echo "::debug::mirrord version resolved to ${MIRRORD_VERSION}"

    - name: Restore mirrord CLI from cache
      if: inputs.cli_path == ''
      id: cache-mirrord
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/mirrord
        key: mirrord-${{ runner.os }}-${{ runner.arch }}-${{ steps.mirrord-version.outputs.version }}

    - name: Install mirrord CLI
      if: steps.cache-mirrord.outputs.cache-hit != 'true' && inputs.cli_path == ''
      shell: bash
      run: |
        if command -v mirrord &>/dev/null; then
          echo "mirrord already available: $(mirrord --version)"
        else
          echo "Installing mirrord..."
          curl -fsSL https://raw.githubusercontent.com/metalbear-co/mirrord/main/scripts/install.sh | bash
          echo "mirrord installed: $(mirrord --version)"
        fi

    - name: Symlink `/usr/local/bin/mirrord` to user-provided `cli_path`
      if: inputs.cli_path != ''
      shell: bash
      run: ln -s ${{ inputs.cli_path }} /usr/local/bin/mirrord

    # ------------------------------------------------------------------ #
    # 2. Run mirrord preview start / stop
    # ------------------------------------------------------------------ #
    - name: Run mirrord preview
      id: run-preview
      shell: bash
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_NAMESPACE: ${{ inputs.namespace }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_FILTER: ${{ inputs.filter }}
        INPUT_PORTS: ${{ inputs.ports }}
        INPUT_TTL_MINS: ${{ inputs.ttl_mins }}
        INPUT_KEY: ${{ inputs.key }}
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_EXTRA_CONFIG: ${{ inputs.extra_config }}
        MIRRORD_PROGRESS_MODE: json
      run: |
        set -euo pipefail
        "${{ github.action_path }}/scripts/run.sh"
